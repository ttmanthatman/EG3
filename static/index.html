<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virtual Human Flow · 林安</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f0f2f5;height:100vh;overflow:hidden}
#header{background:#1a1a2e;color:#eee;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;font-size:14px;flex-shrink:0}
#header .stat{font-size:12px;opacity:.7;margin-left:12px}
#header .stat.on{color:#4caf50}
#header .stat.off{color:#e53935}
#header button{background:transparent;color:#eee;border:1px solid #555;padding:4px 12px;border-radius:4px;cursor:pointer;font-size:12px}
#header button:hover{background:#333}
#app{display:flex;height:calc(100vh - 44px)}

.panel{overflow-y:auto}
#left{width:260px;background:#fff;border-right:1px solid #e0e0e0;padding:14px;flex-shrink:0}
#center{flex:1;display:flex;flex-direction:column;min-width:0}
#right{width:420px;background:#fafafa;border-left:1px solid #e0e0e0;flex-shrink:0}

/* Left: State */
.sec{margin-bottom:14px}
.sec h3{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;border-bottom:1px solid #eee;padding-bottom:4px}
.sec .row{font-size:12px;padding:2px 0;color:#333}
.sec .row .k{color:#999;margin-right:4px}
.card{background:#f6f8fa;border-radius:6px;padding:8px 10px;margin:6px 0;font-size:11px;border-left:3px solid #aaa}
.card.active{border-left-color:#7F77DD}
.card .t{font-weight:600;margin-bottom:2px;font-size:12px}
.card .m{color:#888;font-size:11px}
.meter{display:inline-block;width:50px;height:5px;background:#e0e0e0;border-radius:3px;vertical-align:middle;margin:0 4px}
.meter .f{height:100%;border-radius:3px}
.meter .f.p{background:#4caf50}.meter .f.n{background:#e53935}
.tag{display:inline-block;background:#e8e8e8;padding:1px 6px;border-radius:3px;font-size:10px;margin:1px 2px}

/* Center: Chat */
#msgs{flex:1;overflow-y:auto;padding:16px 20px;background:#f5f6f8}
.msg{margin-bottom:14px;max-width:75%;animation:fadeIn .3s}
.msg.user{margin-left:auto}.msg.persona{margin-right:auto}.msg.system{margin:0 auto;max-width:90%}
.msg .b{display:inline-block;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;word-break:break-word}
.msg.user .b{background:#1976d2;color:#fff;border-bottom-right-radius:4px}
.msg.persona .b{background:#fff;color:#333;border:1px solid #e0e0e0;border-bottom-left-radius:4px}
.msg .n{font-size:11px;color:#999;margin-bottom:3px;padding:0 2px}
.msg.system .b{background:#fff3e0;color:#795548;font-size:12px;border:1px solid #ffe0b2}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

#input-area{display:flex;gap:8px;padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0}
#input-area input{flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none;transition:border-color .2s}
#input-area input:focus{border-color:#1976d2}
#input-area button{padding:10px 20px;background:#1976d2;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;white-space:nowrap}
#input-area button:disabled{opacity:.5;cursor:default}

/* Right: Trace */
.trace-step{margin:8px;background:#fff;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden}
.trace-step .h{padding:8px 12px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:#fafafa}
.trace-step .h .indicator{width:8px;height:8px;border-radius:50%;margin-right:8px;flex-shrink:0}
.trace-step .h .indicator.waiting{background:#ddd}
.trace-step .h .indicator.running{background:#ff9800;animation:pulse 1s infinite}
.trace-step .h .indicator.done{background:#4caf50}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.trace-step .b{display:none;padding:10px 12px;border-top:1px solid #eee;max-height:360px;overflow-y:auto}
.trace-step.open .b{display:block}
.trace-step .b pre{white-space:pre-wrap;word-break:break-word;font-size:11px;font-family:SF Mono,Menlo,monospace;color:#333;line-height:1.5}
.trace-step .b .label{font-size:10px;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.trace-empty{text-align:center;color:#bbb;padding:40px;font-size:13px}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid #ddd;border-top-color:#1976d2;border-radius:50%;animation:spin .8s linear infinite;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="header">
  <span>🌊 Virtual Human Flow · <b>林安</b></span>
  <span>
    <span class="stat" id="conn-status">连接中...</span>
    <button onclick="resetState()">重置</button>
  </span>
</div>
<div id="app">
  <div id="left" class="panel"></div>
  <div id="center">
    <div id="msgs"></div>
    <div id="input-area">
      <input id="msg-input" placeholder="跟林安说话..." onkeydown="if(event.key==='Enter'&&!sent)send()">
      <button id="send-btn" onclick="send()">发送</button>
    </div>
  </div>
  <div id="right" class="panel">
    <div class="trace-empty">Pipeline Trace 将在这里逐步出现</div>
  </div>
</div>

<script>
let ws, state, sent = false;
const stepNames = {
  appraisal: ['🧠 Appraisal 路由', '判断事件触发了哪些关切'],
  memory: ['📖 Memory Recall 记忆召回', '判断哪些记忆在此刻浮现'],
  decision: ['🎯 Response Decision 决策', '决定是否回应及回应姿态'],
  prompt: ['✍️ Prompt Generator', '认知模块输出 → 自然语言回复上下文'],
  reply: ['💬 Reply LLM', '生成林安的回复（DeepSeek）'],
  state_update: ['🔄 State Update 状态更新', '判断并写回状态和记忆变化'],
};

function connect(){
  ws = new WebSocket(`ws://localhost:8765/ws`);
  ws.onopen = ()=>{
    document.getElementById('conn-status').className = 'stat on';
    document.getElementById('conn-status').textContent = '已连接';
  };
  ws.onclose = ()=>{
    document.getElementById('conn-status').className = 'stat off';
    document.getElementById('conn-status').textContent = '断开，重连中...';
    setTimeout(connect, 2000);
  };
  ws.onerror = ()=>{
    document.getElementById('conn-status').className = 'stat off';
    document.getElementById('conn-status').textContent = '连接错误';
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    const t = msg.type;
    if(t === 'state_init' || t === 'state_update'){ state = msg.data; renderState(msg.data) }
    if(t === 'step_progress') handleProgress(msg);
    if(t === 'final') handleFinal(msg);
    if(t === 'error') handleError(msg);
  };
}

function handleProgress(msg){
  const right = document.getElementById('right');
  // Remove empty state on first progress
  if(right.querySelector('.trace-empty')) right.innerHTML = '';

  const step = msg.step;
  if(msg.status === 'running'){
    let el = right.querySelector(`[data-step="${step}"]`);
    if(!el){
      const [title, desc] = stepNames[step] || [step, ''];
      el = document.createElement('div');
      el.className = 'trace-step open';
      el.dataset.step = step;
      el.innerHTML = `<div class="h"><span><span class="indicator running"></span>${title}</span></div>
        <div class="b"><div class="label">${desc}</div><pre>⏳ 正在调用 DeepSeek...</pre></div>`;
      right.appendChild(el);
    } else {
      el.querySelector('.indicator').className = 'indicator running';
      el.querySelector('pre').textContent = '⏳ 正在调用 DeepSeek...';
    }
  }
  if(msg.status === 'done'){
    const el = right.querySelector(`[data-step="${step}"]`);
    if(!el) return;
    el.querySelector('.indicator').className = 'indicator done';
    const body = el.querySelector('.b');

    if(step === 'prompt'){
      // Show the prompt fed to Reply LLM
      body.innerHTML = `<div class="label">喂给 Reply LLM 的完整 Prompt</div><pre>${escapeHtml(msg.prompt)}</pre>`;
    } else if(step === 'reply'){
      body.innerHTML = `<div class="label">林安的回复</div><pre>${escapeHtml(msg.reply)}</pre>`;
    } else if(msg.trace){
      body.innerHTML = `<div class="label">结构化输出</div><pre>${JSON.stringify(msg.trace.output || msg.trace, null, 2)}</pre>`;
    }
    right.scrollTop = right.scrollHeight;
  }
}

function handleFinal(msg){
  sent = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();

  // Add persona's reply to chat
  if(msg.reply){
    addMsg('persona', '林安', msg.reply);
  }
  // Add state delta as system message
  if(msg.state_delta){
    const changes = [
      ...(msg.state_delta.concern_changes||[]),
      ...(msg.state_delta.relationship_changes||[]),
      ...(msg.state_delta.memory_writes||[]),
    ];
    if(changes.length) addMsg('system', '状态变化', changes.join('；'));
  }
}

function handleError(msg){
  sent = false;
  document.getElementById('send-btn').disabled = false;
  addMsg('persona', '系统错误', msg.message);
  // Show error in trace panel
  const right = document.getElementById('right');
  if(right.querySelector('.trace-empty')) right.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'trace-step open';
  el.dataset.step = 'error';
  el.innerHTML = `<div class="h"><span><span class="indicator" style="background:#e53935;width:8px;height:8px;border-radius:50%;margin-right:8px;display:inline-block"></span>❌ 错误</span></div>
    <div class="b"><pre>${escapeHtml(msg.message + '\n\n' + (msg.traceback||''))}</pre></div>`;
  right.appendChild(el);
}

function addMsg(speaker, name, content){
  const d = document.createElement('div');
  d.className = `msg ${speaker}`;
  d.innerHTML = `<div class="n">${name}</div><div class="b">${escapeHtml(content)}</div>`;
  document.getElementById('msgs').appendChild(d);
  document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
}

function renderState(st){
  const p = st.profile, r = st.runtime, m = r.derived_mood;
  let h = `<div class="sec"><h3>角色</h3>
    <div class="row"><b>${p.name}</b> · ${p.age||'?'}岁</div>
    <div class="row" style="color:#666;font-size:11px;margin-top:4px">${p.personality_summary}</div>
  </div>`;

  h += `<div class="sec"><h3>关切</h3>`;
  for(const c of st.concerns||[]){
    const cls = c.status==='active' ? 'active' : '';
    const f = c.valence > 0 ? 'p' : 'n';
    h += `<div class="card ${cls}"><div class="t">${c.title}</div>
      <div class="m">强度 <span class="meter"><span class="f ${f}" style="width:${c.intensity*100}%"></span></span> ${c.intensity.toFixed(2)}
       · valence ${c.valence.toFixed(1)} · ${c.status}</div>
      <div class="m" style="margin-top:2px">触发词: ${(c.triggers||[]).join(', ')}</div></div>`;
  }
  h += '</div>';

  h += `<div class="sec"><h3>关系</h3>`;
  for(const [id, rel] of Object.entries(st.relationships||{})){
    h += `<div class="card"><div class="t">${rel.target_name}</div>
      <div class="m">亲密度 ${rel.familiarity.toFixed(1)} · 信任 ${rel.trust.toFixed(1)} · 好感 ${rel.affection.toFixed(1)} · 紧张 ${rel.tension.toFixed(1)}</div></div>`;
  }
  h += '</div>';

  h += `<div class="sec"><h3>运行状态</h3>
    <div class="row"><span class="k">心情:</span>${m.label} (v:${m.valence.toFixed(1)}, a:${m.arousal.toFixed(1)})</div>
    <div class="row"><span class="k">精力:</span>${r.energy.toFixed(1)}</div></div>`;

  if(st.scene){
    h += `<div class="sec"><h3>场景</h3><div class="row">${st.scene.title}</div>
      <div class="row" style="font-size:11px;color:#666">${st.scene.description}</div></div>`;
  }
  document.getElementById('left').innerHTML = h;
}

function send(){
  const inp = document.getElementById('msg-input');
  const c = inp.value.trim();
  if(!c || !ws || sent) return;
  sent = true;
  document.getElementById('send-btn').disabled = true;
  addMsg('user', 'B', c);
  inp.value = '';

  // Clear trace for new round
  document.getElementById('right').innerHTML = '';

  ws.send(JSON.stringify({type:'send_message',content:c}));
}

function resetState(){
  if(ws) ws.send(JSON.stringify({type:'reset'}));
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('right').innerHTML = '<div class="trace-empty">Pipeline Trace 将在这里逐步出现</div>';
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

connect();
</script>
</body>
</html>
